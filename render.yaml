# render.yaml — Render Blueprint for MathAI Express API
# Docs: https://docs.render.com/blueprint-spec
#
# DEPLOY STEPS:
# 1. Push this repo to GitHub
# 2. In Render dashboard: New → Blueprint → connect repo → select render.yaml
# 3. Set all vars marked sync: false in the Render dashboard
# 4. Deploy

services:
  - type: web
    name: mathai-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database ────────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false              # Supabase pooler URL (with ?pgbouncer=true)
      - key: DIRECT_URL
        sync: false              # Supabase direct URL (no pooler) — used by prisma migrate; falls back to DATABASE_URL if omitted

      # ── Auth ────────────────────────────────────────────────────────────────
      - key: NEXTAUTH_SECRET
        sync: false              # Must match Vercel NEXTAUTH_SECRET exactly

      # ── CORS ────────────────────────────────────────────────────────────────
      - key: CORS_ORIGIN
        value: https://mathai.aiops.ae

      # ── Internal service secret ─────────────────────────────────────────────
      # Shared with Vercel. Allows signup route to call /api/internal/* without
      # a user JWT. Generate with: openssl rand -hex 32
      - key: INTERNAL_SERVICE_SECRET
        sync: false              # Must match Vercel INTERNAL_SERVICE_SECRET exactly

      # ── AI Provider ─────────────────────────────────────────────────────────
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false              # sk-ant-...
      # Uncomment to pin a specific model:
      # - key: AI_MODEL_DEFAULT
      #   value: claude-3-5-haiku-20241022
